<form [formGroup]="form" (ngSubmit)="submit()" class="login-form" novalidate>
    <img src="assets/images/logo-thumb.png" alt="Trucking Team Logo" class="logo" />
  
    <h1>Password Recovery</h1>
    <p class="sub">
      Enter your Eaton Trucking username and we’ll send you instructions to reset your password.
    </p>
  
    <label>
      Email or Username
      <input
        formControlName="identifier"
        placeholder="you@example.com or username"
        autocomplete="username"
        aria-required="true"
        [attr.aria-invalid]="form.controls.identifier.invalid && form.controls.identifier.touched"
      />
    </label>
    <div class="err" *ngIf="form.controls.identifier.touched && form.controls.identifier.invalid">
      This field is required.
    </div>
  
    <button type="submit" [disabled]="loading || form.invalid">
      {{ loading ? 'Sending…' : 'Send reset link' }}
    </button>
  
    <p class="ok" *ngIf="msg">{{ msg }}</p>
    <p class="err" *ngIf="err">{{ err }}</p>
  
    <div class="alt">
      <a [routerLink]="['/auth/login']">Back to sign in</a>
    </div>
  </form>
