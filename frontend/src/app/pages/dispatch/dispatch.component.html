<div class="d-flex justify-content-between align-items-center mb-3">
  <h3>Dispatch Assignments</h3>
  <div class="d-flex align-items-center gap-3">
    <!-- Date Filter -->
    <div class="date-filter">
      <label for="dateInput" class="form-label mb-1">Filter by Date:</label>
      <input 
        type="date" 
        id="dateInput"
        [(ngModel)]="selectedDate" 
        (change)="filterAssignments()" 
        class="form-control custom-date-input">
    </div>
    <button class="btn btn-primary custom-button" (click)="openDialog()">+ Dispatch Driver</button>
  </div>
</div>

<div class="card">
  <div class="card-body">
    <div class="table-responsive">
      <table class="table">
        <thead>
          <tr>
            <th><input type="checkbox" (change)="toggleAllSelection($event)"></th>
            <th>JOB</th>
            <th>DRIVER</th>
            <th>TRUCK TYPE</th>
            <th>DATE</th>
            <th>TIME</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let assignment of filteredAssignments">
            <td><input type="checkbox" [(ngModel)]="assignment.selected"></td>
            <td>{{ assignment.job }}</td>
            <td>{{ assignment.driver }}</td>
            <td>{{ assignment.truck_type }}</td>
            <td>{{ getFormattedDate(assignment.jobDate) }}</td>
            <td>{{ getFormattedTime(assignment.time) }}</td>
          </tr>
          <tr *ngIf="filteredAssignments.length === 0">
            <td colspan="6" class="text-center text-muted py-4">
              No dispatch assignments found for {{ getFormattedDate(selectedDate) }}.
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
