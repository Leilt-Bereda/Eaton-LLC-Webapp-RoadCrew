<!-- Backdrop -->
<div class="modal-backdrop" (click)="cancel.emit()"></div>

<!-- Modal -->
<div class="modal-card" role="dialog" aria-modal="true" aria-label="Create Invoice">
  <div class="modal-header">
    <h5 class="mb-0">Create Invoice</h5>
    <button type="button" class="btn-close" aria-label="Close" (click)="cancel.emit()"></button>
  </div>

  <div class="modal-body">
    <!-- Customer -->
    <label class="form-label">Customer</label>
    <div class="typeahead">
      <input
        class="form-control mb-2"
        type="text"
        placeholder="Type to filter customers…"
        [(ngModel)]="customerQuery"
      />
      <select class="form-select" size="6"
              [(ngModel)]="selectedCustomerId"
              (change)="onCustomerChange()">
        <option *ngFor="let c of filteredCustomers()" [ngValue]="c.id">
          {{ c.name }}
        </option>
      </select>
    </div>

    <!-- Job -->
    <label class="form-label mt-3">Job</label>
    <div class="typeahead">
      <input
        class="form-control mb-2"
        type="text"
        placeholder="Type to filter jobs…"
        [(ngModel)]="jobQuery"
        [disabled]="!selectedCustomerId"
      />
      <select class="form-select" size="6"
              [(ngModel)]="selectedJobId"
              [disabled]="!selectedCustomerId">
        <option *ngFor="let j of filteredJobs()" [ngValue]="j.id">
          {{ j.jobNumber }} — {{ j.projectName }}
        </option>
      </select>
    </div>

    <!-- Date -->
    <label class="form-label mt-3">Invoice Date</label>
    <input class="form-control"
           type="date"
           [(ngModel)]="date" />
  </div>

  <div class="modal-footer">
    <button class="btn btn-secondary" (click)="cancel.emit()">Cancel</button>
    <button class="btn btn-primary" [disabled]="!canSave()" (click)="doSave()">Create</button>
  </div>
</div>
