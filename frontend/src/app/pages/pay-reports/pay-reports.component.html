<div class="d-flex justify-content-between align-items-center mb-3">
    <h3>Pay Reports</h3>
    <div class="d-flex gap-2">
      <button class="btn btn-outline-secondary" [routerLink]="['/pay-reports/new']">
        Add Report
      </button>
    </div>
  </div>
  
  <div class="mb-3 row g-2">
    <div class="col-md-3">
      <h6>Driver</h6>
      <input class="form-control" placeholder="Driver" [(ngModel)]="filters.driver" (ngModelChange)="applyFilters()">
    </div>
    <div class="col-md-3">
      <h6>Start Date</h6>
      <input class="form-control" type="date" [(ngModel)]="filters.from" (ngModelChange)="applyFilters()">
    </div>
    <div class="col-md-3">
      <h6>End Date</h6>
      <input class="form-control" type="date" [(ngModel)]="filters.to" (ngModelChange)="applyFilters()">
    </div>
  </div>
  
  <app-card cardTitle="Reports" [options]="false" blockClass="table-border-style">
    <div class="table-responsive">
      <table class="table">
        <thead>
          <tr>
            <th></th>
            <th>Week</th>
            <th>Driver</th>
            <th>Truck #</th>
            <th>Job #</th>
            <th>Weight/Hour</th>
            <th>Truck Paid</th>
            <th>Total</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let r of reports; trackBy: trackById">
            <td><input type="checkbox" [(ngModel)]="r.selected" (ngModelChange)="onSelect()" /></td>
            <td>{{ r.weekStart }} – {{ r.weekEnd }}</td>
            <td>{{ r.driverName }}</td>
            <td><!-- optional: show first line's truck or 'multi' --></td>
            <td><!-- optional: show one job or 'multi' --></td>
            <td>{{ r.totalWeightOrHours | number:'1.0-2' }}</td>
            <td>{{ r.totalTruckPaid | currency }}</td>
            <td><strong>{{ r.totalAmount | currency }}</strong></td>
            <td>
              <a class="btn btn-sm btn-outline-primary" [routerLink]="['/pay-reports', r.id]">Open</a>
            </td>
          </tr>
          <tr *ngIf="!reports?.length">
            <td colspan="9" class="text-center text-muted py-4">No pay reports yet.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </app-card>
